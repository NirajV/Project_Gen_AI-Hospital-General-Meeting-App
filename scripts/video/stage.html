<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BioMedMeet — Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --plum: #68517d;
    --plum-deep: #4b3a5c;
    --navy: #0b0b30;
    --sage: #3b6658;
    --amber: #694e20;
    --ink: #1a1c2e;
    --paper: #f8f5fa;
    --paper-2: #f3edf5;
    --line: #e6e1ea;
  }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: var(--paper); font-family: 'Inter', sans-serif; color: var(--ink); }
  .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
  /* Background grid + radial glow */
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1100px circle at 90% 10%, rgba(104,81,125,0.22), transparent 60%),
      radial-gradient(900px circle at 5% 95%, rgba(59,102,88,0.18), transparent 60%),
      linear-gradient(to right, rgba(11,11,48,0.045) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(11,11,48,0.045) 1px, transparent 1px);
    background-size: auto, auto, 48px 48px, 48px 48px;
  }
  /* Brand bar (top) */
  .brand {
    position: absolute; top: 56px; left: 80px;
    display: flex; align-items: center; gap: 18px;
    font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 36px; color: var(--navy);
  }
  .brand .pulse { width: 56px; height: 56px; display: grid; place-items: center; background: var(--navy); border-radius: 16px; }
  .brand .pulse svg { stroke: #fff; }
  .brand small { display: block; font-size: 16px; color: #6b7280; font-weight: 500; letter-spacing: 0.06em; margin-top: 2px; }
  /* Hero text block */
  .body { position: absolute; top: 200px; left: 80px; right: 80px; bottom: 220px; display: flex; flex-direction: column; justify-content: center; }
  .body h1 {
    font-family: 'Manrope', sans-serif; font-size: 130px; font-weight: 800; line-height: 1.02; color: var(--navy);
    letter-spacing: -0.025em;
  }
  .body h1 em { font-style: normal; color: var(--plum); }
  .body .lead { font-size: 32px; color: #4b5063; margin-top: 28px; max-width: 1400px; line-height: 1.45; }
  /* Bottom caption ribbon */
  .caption {
    position: absolute; left: 0; right: 0; bottom: 56px;
    display: flex; align-items: center; gap: 24px; justify-content: center;
  }
  .caption-pill {
    background: var(--navy); color: #fff;
    padding: 22px 48px; border-radius: 999px;
    font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 30px;
    letter-spacing: 0.01em;
    box-shadow: 0 18px 50px rgba(11,11,48,0.18);
  }
  .url { position: absolute; right: 80px; top: 64px; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 24px; color: #6b7280; }

  /* Mock UI surfaces */
  .ui-card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(11,11,48,0.10), 0 6px 18px rgba(11,11,48,0.06);
    border: 1px solid var(--line);
  }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; margin-top: 28px; }
  .stat { padding: 32px; border-radius: 22px; display: flex; align-items: center; justify-content: space-between; }
  .stat .num { font-family: 'Manrope', sans-serif; font-size: 64px; font-weight: 800; line-height: 1; }
  .stat .lbl { font-size: 18px; color: #475063; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .stat .icn { width: 72px; height: 72px; border-radius: 18px; display: grid; place-items: center; }
  .stat.s1 { background: #e8e8f5; } .stat.s1 .num { color: var(--navy); } .stat.s1 .icn { background: var(--navy); }
  .stat.s2 { background: #e8f5f0; } .stat.s2 .num { color: var(--sage); } .stat.s2 .icn { background: var(--sage); }
  .stat.s3 { background: #f5f0e8; } .stat.s3 .num { color: var(--amber); } .stat.s3 .icn { background: var(--amber); }
  .stat.s4 { background: #f3edf5; } .stat.s4 .num { color: var(--plum); } .stat.s4 .icn { background: var(--plum); }
  .stat .icn svg { stroke: #fff; }

  .row-card { padding: 22px 28px; margin-top: 14px; display: flex; align-items: center; gap: 22px; border-radius: 18px; }
  .row-card .pin { width: 56px; height: 56px; border-radius: 14px; background: var(--sage); display: grid; place-items: center; }
  .row-card .pin svg { stroke: #fff; }
  .row-card .meta { color: #4b5063; font-size: 18px; }
  .row-card .ttl { font-size: 26px; font-weight: 700; color: var(--ink); }
  .badge { background: #e8e8f5; color: var(--navy); border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 16px; margin-left: auto; }

  /* Wizard chips */
  .chips { display: flex; gap: 18px; margin-top: 30px; }
  .chip { background: #fff; border: 1px solid var(--line); padding: 18px 26px; border-radius: 999px; font-weight: 600; font-size: 22px; color: #4b5063; }
  .chip.active { background: var(--plum); color: #fff; border-color: var(--plum); box-shadow: 0 12px 30px rgba(104,81,125,0.30); }

  /* Email mock */
  .email { width: 1100px; margin: 24px 0 0 0; padding: 36px 44px; border-radius: 22px; background: #fff; border: 1px solid var(--line); box-shadow: 0 20px 50px rgba(11,11,48,0.08); }
  .email .from { color: #6b7280; font-size: 18px; }
  .email .subj { font-family: 'Manrope', sans-serif; font-size: 36px; font-weight: 800; color: var(--navy); margin-top: 4px; }
  .email .btns { display: flex; gap: 14px; margin-top: 26px; }
  .email .btn { padding: 16px 28px; border-radius: 12px; font-weight: 700; font-size: 20px; }
  .email .btn.accept { background: var(--sage); color: #fff; }
  .email .btn.decline { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .email .btn.view { background: var(--navy); color: #fff; }
  .email .ics { margin-top: 20px; padding: 14px 18px; border: 1px dashed var(--line); border-radius: 12px; display: flex; align-items: center; gap: 14px; color: #4b5063; font-size: 18px; }

  /* Patient card */
  .patient-row { display: flex; gap: 18px; align-items: center; padding: 22px 28px; border-radius: 18px; background: #fff; border: 1px solid var(--line); margin-top: 14px; }
  .avatar { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 26px; color: #fff; background: var(--plum); }
  .patient-row .mrn { color: #6b7280; font-size: 18px; margin-top: 2px; }
  .patient-row .name { font-size: 24px; font-weight: 700; }
  .tag { margin-left: auto; background: #f3edf5; color: var(--plum); border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 16px; }

  /* Decision row */
  .decision { display: flex; align-items: center; padding: 22px 28px; border-radius: 18px; background: #fff; border-left: 6px solid var(--plum); margin-top: 14px; gap: 22px; box-shadow: 0 12px 30px rgba(11,11,48,0.05); }
  .decision .who { font-weight: 700; color: var(--navy); }
  .decision .when { color: #6b7280; font-size: 18px; }
  .decision .text { font-size: 22px; color: var(--ink); flex: 1; }
  .decision .status { background: #e8f5f0; color: var(--sage); border-radius: 999px; padding: 8px 18px; font-weight: 700; font-size: 16px; }

  /* PDF preview mock */
  .pdf { width: 760px; aspect-ratio: 1 / 1.41; background: #fff; border-radius: 20px; box-shadow: 0 30px 80px rgba(11,11,48,0.20); border: 1px solid var(--line); padding: 56px; }
  .pdf h2 { font-family: 'Manrope', sans-serif; color: var(--navy); font-size: 44px; }
  .pdf .meta { color: #6b7280; margin-top: 8px; font-size: 20px; }
  .pdf hr { border: none; border-top: 1px solid var(--line); margin: 22px 0; }
  .pdf .row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 22px; color: #1a1c2e; }
  .pdf .row b { color: var(--plum); }

  /* Code/terminal mock for scheduler */
  .code { background: #0b0b30; color: #cfe8da; border-radius: 18px; padding: 28px 32px; font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; line-height: 1.6; box-shadow: 0 24px 60px rgba(11,11,48,0.25); }
  .code .ts { color: #8fa0c9; }
  .code .ok { color: #8be9a6; }
  .code .warn { color: #f6c177; }
  .code .info { color: #cfd5ea; }

  /* Big icon block (outro) */
  .center {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .center .big {
    font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 180px; letter-spacing: -0.04em; color: var(--navy);
  }
  .center .big em { font-style: normal; color: var(--plum); }
  .center .sub { margin-top: 18px; color: #4b5063; font-size: 32px; font-weight: 500; }
  .center .url-pill { margin-top: 36px; background: var(--plum); color: #fff; padding: 18px 36px; border-radius: 999px; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 28px; box-shadow: 0 18px 50px rgba(104,81,125,0.40); }
</style>
</head>

window.renderScene = function (sceneId, caption) {
