<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BioMedMeet — Videos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root { --plum:#68517d; --plum-deep:#4b3a5c; --navy:#0b0b30; --sage:#3b6658; --amber:#694e20; --ink:#1a1c2e; --paper:#f8f5fa; --line:#e6e1ea; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:var(--paper); color:var(--ink); line-height:1.55; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 64px 24px 96px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 56px; }
  .brand { display:flex; align-items:center; gap:14px; font-family:'Manrope',sans-serif; font-weight:800; font-size:22px; color:var(--navy); text-decoration:none; }
  .brand .dot { width:36px; height:36px; background:var(--navy); border-radius:10px; display:grid; place-items:center; }
  .brand .dot svg { stroke:#fff; }
  nav a { margin-left: 22px; color:#4b5063; text-decoration:none; font-weight:600; font-size:15px; }
  nav a:hover { color: var(--plum); }
  h1 { font-family:'Manrope',sans-serif; font-size: clamp(40px, 6vw, 72px); line-height:1.04; letter-spacing:-0.02em; margin:0 0 18px; }
  h1 em { color: var(--plum); font-style: normal; }
  .lede { font-size: 20px; color:#4b5063; max-width: 760px; margin-bottom: 56px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 28px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:20px; overflow:hidden; box-shadow: 0 22px 56px rgba(11,11,48,0.06); transition: transform .25s ease, box-shadow .25s ease; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 32px 70px rgba(11,11,48,0.12); }
  .card video { width:100%; height:auto; display:block; background:#000; aspect-ratio:16/9; }
  .card .meta { padding: 22px 24px 24px; }
  .card .tag { display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:#f3edf5; color:var(--plum); padding:6px 12px; border-radius:999px; }
  .card .tag.hero { background:#0b0b30; color:#fff; }
  .card h3 { font-family:'Manrope',sans-serif; font-size:22px; margin:14px 0 6px; color:var(--navy); }
  .card p { color:#4b5063; font-size:15px; margin:0 0 18px; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:11px 18px; border-radius:10px; font-weight:700; font-size:14px; text-decoration:none; border:1px solid transparent; transition: background .2s ease, color .2s ease, border-color .2s ease; }
  .btn.primary { background:var(--plum); color:#fff; }
  .btn.primary:hover { background:var(--plum-deep); }
  .btn.ghost { background:#fff; color:var(--ink); border-color:var(--line); }
  .btn.ghost:hover { background:#f3edf5; border-color:var(--plum); color:var(--plum); }
  .copy-state { font-size:13px; color: var(--sage); font-weight:700; }
  footer { margin-top: 80px; padding-top: 32px; border-top:1px solid var(--line); display:flex; justify-content:space-between; font-size:14px; color:#6b7280; }
  footer a { color: var(--plum); text-decoration:none; font-weight:600; }
  .all-download { margin-top: 44px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="brand" href="/home/">
      <span class="dot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h3l2-7 4 14 2-7h7"/></svg></span>
      BioMedMeet
    </a>
    <nav>
      <a href="/home/">Home</a>
      <a href="/home/features.html">Features</a>
      <a href="/home/pricing.html">Pricing</a>
      <a href="/home/contact.html">Contact</a>
      <a href="/" style="background:var(--plum); color:#fff; padding:10px 18px; border-radius:8px; margin-left:18px;">Open app →</a>
    </nav>
  </header>

  <h1>BioMedMeet · <em>videos</em>.</h1>
  <p class="lede">
    Short, downloadable, share-anywhere MP4s. One marketing overview plus six
    feature walkthroughs. All voice-over narrated. Right-click any video to
    download — or use the buttons.
  </p>

  <div class="grid" id="grid"></div>

  <div class="all-download">
    <button class="btn primary" id="copy-all">📋 Copy all video links</button>
    <span id="copy-state" class="copy-state"></span>
  </div>

  <footer>
    <div>© BioMedMeet · biomedmeet.com</div>
    <div><a href="/home/">← back to home</a></div>
  </footer>
</div>

<script>
const VIDEOS = [
  { file: '00-marketing-hero.mp4',                title: 'BioMedMeet — Hospital Case Meeting Scheduler', tag: 'Marketing',     hero:true,  desc: 'The 60-second pitch. Built for clinicians, by clinicians.' },
  { file: '01-schedule-meeting.mp4',              title: 'Schedule a meeting in under 60 seconds',        tag: 'Feature · 1', hero:false, desc: 'Three-step wizard. Auto Teams link. Calendar invites. Done.' },
  { file: '02-patients-and-treatment-plans.mp4',  title: 'Patient cards & treatment plans',                tag: 'Feature · 2', hero:false, desc: 'Patients as first-class records. Full 360° history.' },
  { file: '03-decisions-and-summary-pdf.mp4',     title: 'Decisions log + one-click summary PDF',          tag: 'Feature · 3', hero:false, desc: 'Audit trail built in. From decision to documentation.' },
  { file: '04-reminders-and-calendar.mp4',        title: 'Automatic reminders & .ics calendar invites',    tag: 'Feature · 4', hero:false, desc: 'Background scheduler. 1h reminder. Auto-complete after end-time.' },
  { file: '05-participants-and-roles.mp4',        title: 'Manage your hospital team — Participants & roles', tag: 'Feature · 5', hero:false, desc: 'Onboard staff in seconds. Doctor, Nurse, Admin, Organizer — one click.' },
  { file: '06-profile-and-settings.mp4',          title: 'Your profile — personal, secure, regional, heard',  tag: 'Feature · 6', hero:false, desc: 'Profile, password, regional settings, holidays, and feedback — all in one place.' },
];

const grid = document.getElementById('grid');
VIDEOS.forEach(v => {
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = `
    <video controls preload="metadata" poster="" data-testid="video-${v.file}">
      <source src="./${v.file}" type="video/mp4">
    </video>
    <div class="meta">
      <span class="tag ${v.hero ? 'hero' : ''}">${v.tag}</span>
      <h3>${v.title}</h3>
      <p>${v.desc}</p>
      <div class="actions">
        <a class="btn primary" href="./${v.file}" download data-testid="download-${v.file}">⬇ Download MP4</a>
        <button class="btn ghost" data-copy="${location.origin}/marketing/${v.file}">📋 Copy link</button>
      </div>
    </div>
  `;
  grid.appendChild(el);
});

// Per-card copy
grid.addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-copy]');
  if (!btn) return;
  try {
    await navigator.clipboard.writeText(btn.dataset.copy);
    const prev = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => (btn.textContent = prev), 1500);
  } catch { /* ignore */ }
});

// Copy all links at once
document.getElementById('copy-all').addEventListener('click', async () => {
  const links = VIDEOS.map(v => `${location.origin}/marketing/${v.file}`).join('\n');
  try {
    await navigator.clipboard.writeText(links);
    document.getElementById('copy-state').textContent = '✓ ' + VIDEOS.length + ' links copied to clipboard';
  } catch {
    document.getElementById('copy-state').textContent = 'Could not copy — please copy manually.';
  }
});
</script>
</body>
</html>
