services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: hospital_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: ${DB_NAME:-hospital_meeting_scheduler}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./database/DDL_Mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - hospital_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital_backend
    restart: unless-stopped
    environment:
      # MongoDB Configuration
      - MONGO_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme123}@mongodb:27017
      - DB_NAME=${DB_NAME:-hospital_meeting_scheduler}
      
      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key-in-production-minimum-32-chars}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      
      # CORS Configuration
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      
      # Email Configuration (Optional)
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}

      # Email Reminder Scheduler (1h-before reminders)
      - EMAIL_REMINDERS_ENABLED=${EMAIL_REMINDERS_ENABLED:-true}
      - REMINDER_POLL_SECONDS=${REMINDER_POLL_SECONDS:-300}

      # Microsoft Teams / Graph API Configuration (Optional)
      # Obtain these from Azure Entra ID > App Registrations.
      # Required for auto-generating Teams meeting links.
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - GRAPH_USER_ID=${GRAPH_USER_ID:-}

      # Upload Directory
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8001:8001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hospital_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANT: leave EMPTY so the React app calls same-origin /api/*
        # and nginx (inside this container) proxies to backend:8001.
        # This makes the app work over LAN IP, Tailscale IP, AND Cloudflare
        # tunnel without a rebuild — no hostname is baked into the JS bundle.
        - REACT_APP_BACKEND_URL=
    container_name: hospital_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_BACKEND_URL=
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hospital_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  hospital_network:
    driver: bridge
    name: hospital_network

volumes:
  mongodb_data:
    driver: local
    name: hospital_mongodb_data
  mongodb_config:
    driver: local
    name: hospital_mongodb_config
  uploads_data:
    driver: local
    name: hospital_uploads_data
